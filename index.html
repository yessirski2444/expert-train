<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimTown ∞ • Hyper-Realistic AI Simulation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: 'Press Start 2P', system-ui;
            color: #0f0;
        }
        
        canvas {
            display: block;
        }
        
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        
        #sidebar {
            position: absolute;
            left: 20px;
            top: 20px;
            width: 280px;
            background: rgba(0, 255, 0, 0.1);
            border: 3px solid #0f0;
            padding: 15px;
            pointer-events: all;
            box-shadow: 0 0 20px #0f0;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        #sidebar h1 {
            font-size: 18px;
            margin: 0 0 15px 0;
            text-align: center;
            text-shadow: 0 0 10px #0f0;
        }
        
        .resident {
            display: flex;
            align-items: center;
            padding: 8px;
            margin-bottom: 8px;
            background: rgba(0, 255, 0, 0.05);
            border: 2px solid #0f0;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .resident:hover {
            background: rgba(0, 255, 0, 0.3);
            transform: scale(1.03);
        }
        
        .resident.awake {
            border-color: #f00;
            box-shadow: 0 0 15px #f00;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 15px #f00; }
            50% { box-shadow: 0 0 30px #f00; }
            100% { box-shadow: 0 0 15px #f00; }
        }
        
        #npc-panel {
            position: absolute;
            right: 20px;
            bottom: 20px;
            width: 380px;
            background: rgba(0, 20, 0, 0.95);
            border: 4px solid #0f0;
            padding: 20px;
            display: none;
            pointer-events: all;
            box-shadow: 0 0 30px #0f0;
        }
        
        #npc-name {
            font-size: 24px;
            margin: 0 0 10px 0;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }
        
        #npc-info {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        #chat-log {
            height: 180px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            border: 2px solid #0f0;
            margin-bottom: 10px;
            font-size: 13px;
        }

            padding: 10px;
