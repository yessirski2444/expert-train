<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Hyper-Realistic Town Simulation</title>
<style>
  body { margin: 0; overflow: hidden; }
  #town { width: 100vw; height: 100vh; display: block; }
  .bubble {
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 14px;
    max-width: 250px;
    text-align: center;
    pointer-events: none;
    font-family: Arial, sans-serif;
    line-height: 1.3;
  }
</style>
</head>
<body>
<div id="town"></div>

<!-- Three.js + GLTFLoader + CSS2DRenderer -->
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/renderers/CSS2DRenderer.js"></script>

<script src="script.js"></script>
</body>
</html>
